          \ ,\\s]/g,\"\").trim();\n    const n=Number(s);\n    return Number.isFinite(n)?n:\"\
          \";\n  }\n  function normalizeStage(v){\n    const s=String(v??\"\").trim().toLowerCase();\n\
          \    if([\"pre\",\"事前\",\"仮\",\"仮審査\"].includes(s)) return \"pre\";\n  \
          \  if([\"final\",\"本\",\"本審査\"].includes(s)) return \"final\";\n    return\
          \ \"\";\n  }\n  const obj=safeJsonParse(text)||{};\n  const normalized_slots={\n\
          \    screening_stage: normalizeStage(obj.screening_stage),\n    screening_date_months_ago:\
          \ toNumberOrEmpty(obj.screening_date_months_ago),\n    screening_reason_known:\
          \ toYesNo(obj.screening_reason_known),\n    screening_reason_text: String(obj.screening_reason_text??\"\
          \").trim(),\n  };\n  return { normalized_slots };\n}"
