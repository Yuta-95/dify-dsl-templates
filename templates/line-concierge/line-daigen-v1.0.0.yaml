    - data:
        code: "function main(inputs){\n  const raw = (inputs.text ?? \"\").toString();\n\
          \  const text = raw;\n\n  const pick = (v)=> String(v ?? \"\").trim();\n\
          \n  // helper: normalize yes/no/unknown from a snippet\n  const normYN =\
