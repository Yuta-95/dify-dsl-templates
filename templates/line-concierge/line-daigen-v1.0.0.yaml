    - data:
        code: "function main(inputs) {\n  const text = inputs.text;\n\n  function\
          \ safeJsonParse(str) {\n    try { return JSON.parse(str); } catch (e) {\
          \ return null; }\n  }\n\n  function toYesNo(v) {\n    const s = String(v\
          \ ?? \"\").trim().toLowerCase();\n    if ([\"yes\",\"y\",\"true\",\"1\"\
          ,\"あり\",\"有\",\"ある\",\"はい\"].includes(s)) return \"yes\";\n    if ([\"no\"\
          ,\"n\",\"false\",\"0\",\"なし\",\"無\",\"ない\",\"いいえ\"].includes(s)) return\
          \ \"no\";\n    return \"\";\n  }\n\n  // 目的：金額系は「万円」単位で保存（例：800万→800、45,000円→4.5）\n\
          \  function parseMoneyToMan(v) {\n    if (v === null || v === undefined)\
          \ return \"\";\n    if (typeof v === \"number\" && Number.isFinite(v)) return\
          \ v;\n\n    let s = String(v).trim();\n    if (!s) return \"\";\n\n    //\
          \ 全角数字→半角\n    s = s.replace(/[０-９]/g, (c) => String.fromCharCode(c.charCodeAt(0)\
          \ - 0xFEE0));\n    // カンマ/空白除去\n    s = s.replace(/[，,]/g, \"\");\n    s\
          \ = s.replace(/\\s/g, \"\");\n\n    // よくある単位除去（「万」は残す）\n    s = s.replace(/(税込|税抜)/g,\
          \ \"\");\n\n    // 「X万」「X万円」→ X（万円）\n    const manMatch = s.match(/^(-?\\\
          d+(\\.\\d+)?)万(円)?$/);\n    if (manMatch) {\n      const n = Number(manMatch[1]);\n\
          \      return Number.isFinite(n) ? n : \"\";\n    }\n    const manEnMatch\
          \ = s.match(/^(-?\\d+(\\.\\d+)?)万円$/);\n    if (manEnMatch) {\n      const\
          \ n = Number(manEnMatch[1]);\n      return Number.isFinite(n) ? n : \"\"\
          ;\n    }\n\n    // 「円」表記 → 万円に換算\n    const yenMatch = s.match(/^(-?\\d+(\\\
          .\\d+)?)円?$/);\n    if (yenMatch) {\n      const yen = Number(yenMatch[1]);\n\
          \      if (!Number.isFinite(yen)) return \"\";\n      // 45,000円 → 4.5（万円）\n\
          \      return Math.round((yen / 10000) * 10) / 10;\n    }\n\n    return\
          \ \"\";\n  }\n\n  // 件数は数値へ（\"3件\"→3）\n  function parseCount(v) {\n    if\
          \ (v === null || v === undefined) return \"\";\n    if (typeof v === \"\
          number\" && Number.isFinite(v)) return v;\n    let s = String(v).trim();\n\
          \    if (!s) return \"\";\n    s = s.replace(/[０-９]/g, (c) => String.fromCharCode(c.charCodeAt(0)\
          \ - 0xFEE0));\n    s = s.replace(/[，,]/g, \"\");\n    s = s.replace(/\\\
          s/g, \"\");\n    s = s.replace(/(件|回)/g, \"\");\n    const n = Number(s);\n\
          \    return Number.isFinite(n) ? n : \"\";\n  }\n\n  const obj = safeJsonParse(text)\
          \ || {};\n\n  const normalized = {\n    prefecture: String(obj.prefecture\
          \ ?? \"\").trim(),\n    employment_type: String(obj.employment_type ?? \"\
          \").trim(),\n    annual_income: parseMoneyToMan(obj.annual_income),    \
          \        // 万円\n    loan_count: parseCount(obj.loan_count),\n    loan_total_amount:\
          \ parseMoneyToMan(obj.loan_total_amount),    // 万円\n    monthly_repayment_total:\
          \ parseMoneyToMan(obj.monthly_repayment_total), // 万円\n    has_delinquency:\
          \ toYesNo(obj.has_delinquency),\n    has_past_screening_failure: toYesNo(obj.has_past_screening_failure),\n\
          \  };\n\n  return { normalized_slots: normalized };\n}"
        code_language: javascript
