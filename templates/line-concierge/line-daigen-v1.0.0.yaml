    - data:
        code: "function tailYesNo(line) {\n  const s = (line ?? '').toString().trim();\n\
          \  // 行末にある「はい/いいえ」を最優先\n  const m = s.match(/(はい|いいえ)\\s*$/);\n  if (!m)\
          \ return '';\n  return m[1] === 'はい' ? 'yes' : 'no';\n}\n\nfunction findLine(text,\
          \ keyword) {\n  const lines = (text ?? '').toString().split('\\n').map(x\
          \ => x.trim()).filter(Boolean);\n  // 「キーワードを含む行」を1行だけ拾う（最初に当たったもの）\n  return\
          \ lines.find(l => l.includes(keyword)) || '';\n}\n\nfunction main(inputs)\
          \ {\n  const q = inputs.query ?? '';\n  const slots = inputs.cv_slots ??\
          \ {};\n\n  // テンプレから厳密に拾う（最優先）\n  const lineDel  = findLine(q, '返済遅延');\n\
          \  const lineFail = findLine(q, '審査落ち');\n\n  let has_delinquency = tailYesNo(lineDel);\n\
          \  let has_past_screening_failure = tailYesNo(lineFail);\n\n  // テンプレから取れなかった時だけ\
          \ slots を補助的に使う\n  const sDel = (slots.has_delinquency ?? '').toString().toLowerCase();\n\
          \  const sFail = (slots.has_past_screening_failure ?? '').toString().toLowerCase();\n\
          \n  if (!has_delinquency) {\n    if (sDel === 'yes' || sDel === 'no') has_delinquency\
          \ = sDel;\n    else has_delinquency = 'unknown';\n  }\n  if (!has_past_screening_failure)\
          \ {\n    if (sFail === 'yes' || sFail === 'no') has_past_screening_failure\
          \ = sFail;\n    else has_past_screening_failure = 'unknown';\n  }\n\n  return\
          \ { has_delinquency, has_past_screening_failure };\n}\n"
        code_language: javascript
        outputs:
          has_delinquency:
            children: null
            type: string
          has_past_screening_failure:
            children: null
            type: string
