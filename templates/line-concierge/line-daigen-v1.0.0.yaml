          \ safeJsonParse(str){try{return JSON.parse(str);}catch(e){return null;}}\n\
          \  function toYesNo(v){\n    const s=String(v??\"\").trim().toLowerCase();\n\
          \    if([\"yes\",\"y\",\"true\",\"1\",\"あり\",\"有\",\"ある\",\"はい\"].includes(s))\
