          \ \"yes\";\n    if(/(なし|無|ない|いいえ|未開示|まだ)/.test(s)) return \"no\";\n    return\
          \ \"\";\n  };\n\n  const normalized_slots = {\n    delinquency_count_bucket:\
          \ \"\",\n    delinquency_max_delay_bucket: \"\",\n    has_credit_report:\
          \ \"\",\n    assignment_status: \"\",\n    debt_relief_status: \"\"\n  };\n\
          \n  // 1) delinquency count bucket\n  {\n    const s=text.replace(/\\s+/g,\"\
          \");\n    if(/2[-〜~]3回/.test(s)) normalized_slots.delinquency_count_bucket=\"\
          2-3\";\n    else if(/4[-〜~]6回/.test(s)) normalized_slots.delinquency_count_bucket=\"\
          4-6\";\n    else if(/7(\\+|回以上|以上)/.test(s)) normalized_slots.delinquency_count_bucket=\"\
          7+\";\n    else{\n      const m=s.match(/遅延回数[:：]?(\\\\d+)回?/);\n      if(m){\n\
          \        const n=Number(m[1]);\n        if(n>=2 && n<=3) normalized_slots.delinquency_count_bucket=\"\
          2-3\";\n        else if(n>=4 && n<=6) normalized_slots.delinquency_count_bucket=\"\
          4-6\";\n        else if(n>=7) normalized_slots.delinquency_count_bucket=\"\
          7+\";\n      }\n    }\n  }\n\n  // 2) max delay bucket\n  {\n    const s=text.replace(/\\\
          s+/g,\"\");\n    if(/2[-〜~]3日/.test(s)) normalized_slots.delinquency_max_delay_bucket=\"\
          2-3d\";\n    else if(/4[-〜~]6日/.test(s)) normalized_slots.delinquency_max_delay_bucket=\"\
          4-6d\";\n    else if(/7(日以上|以上|\\\\+)|1週間以上|2週間|1ヶ?月/.test(s)) normalized_slots.delinquency_max_delay_bucket=\"\
          7d+\";\n    else{\n      const m=s.match(/最長遅延(期間)?[:：]?(\\\\d+)日/);\n \
          \     if(m){\n        const n=Number(m[2]);\n        if(n>=2 && n<=3) normalized_slots.delinquency_max_delay_bucket=\"\
          2-3d\";\n        else if(n>=4 && n<=6) normalized_slots.delinquency_max_delay_bucket=\"\
          4-6d\";\n        else if(n>=7) normalized_slots.delinquency_max_delay_bucket=\"\
          7d+\";\n      }\n    }\n  }\n\n  // 3) credit report: accept both \"信用情報:なし\"\
          \ and \"信用情報なし\"\n  {\n    const m = text.match(/(信用情報|CIC|JICC)[^\\n]*?(あり|なし|不明|わからない|分からない|はい|いいえ)/);\n\
          \    if(m){\n      const yn = normYN(m[2]);\n      if(yn===\"yes\") normalized_slots.has_credit_report=\"\
          yes\";\n      else if(yn===\"no\") normalized_slots.has_credit_report=\"\
          no\";\n      // unknown -> treat as blank to re-ask\n    }\n  }\n\n  //\
          \ 4) assignment: accept \"債権異動不明\" etc.\n  {\n    const m = text.match(/(債権異動|異動)[^\\\
          n]*?(あり|なし|不明|わからない|分からない|はい|いいえ)/);\n    if(m){\n      const yn = normYN(m[2]);\n\
          \      if(yn===\"unknown\") normalized_slots.assignment_status=\"unknown\"\
          ;\n      else if(yn===\"yes\") normalized_slots.assignment_status=\"yes\"\
          ;\n      else if(yn===\"no\") normalized_slots.assignment_status=\"no\"\
          ;\n    }\n  }\n\n  // 5) debt relief: accept \"債務整理なし\" etc.\n  {\n    //\
          \ if mentions specific types, it's yes\n    if(/(任意整理|個人再生|自己破産)/.test(text))\
          \ normalized_slots.debt_relief_status=\"yes\";\n    else{\n      const m\
          \ = text.match(/(債務整理|自己破産)[^\\n]*?(あり|なし|不明|わからない|分からない|はい|いいえ|していない)/);\n\
          \      if(m){\n        const yn = normYN(m[2]);\n        if(yn===\"yes\"\
          ) normalized_slots.debt_relief_status=\"yes\";\n        else if(yn===\"\
          no\") normalized_slots.debt_relief_status=\"no\";\n      }\n    }\n  }\n\
          \n  return { normalized_slots };\n}"
